# ============================================================
# 天工机器人配置
# 按模块命名空间组织
# ============================================================

# ============================================================
# 机器人基础信息
# ============================================================
robot_base:
  name: "tiangong"
  num_dof: 20  # 腿12 + 臂8
  robot_dir: ".."
  threads:
    rl_infer:       # RL 推理线程
      cpu_id: -1
      sched: other
      priority: 0
    control_main:   # control_demo 主控制循环
      cpu_id: -1
      sched: other
      priority: 0
    driver_main:    # driver_demo / hardware 主线程
      cpu_id: -1
      sched: other
      priority: 0

  # 默认 PD 增益（顺序：左腿6 + 右腿6 + 左臂4 + 右臂4）
  kp: [50, 50, 80, 50, 20, 10,     # 左腿
       50, 50, 80, 50, 20, 10,     # 右腿
       30, 15, 8, 8,               # 左臂
       30, 15, 8, 8]               # 右臂
  kd: [5, 5, 3, 5, 1.5, 1,         # 左腿
       5, 5, 3, 5, 1.5, 1,         # 右腿
       2, 1, 0.5, 0.5,             # 左臂
       2, 1, 0.5, 0.5]             # 右臂

  # 默认关节角度（机器人自然站立姿态）
  default_joint_pos: [0.0, -0.5, 0.0, 1.0, -0.5, 0.0,    # 左腿（与 rl_default_pos 一致）
                      0.0, -0.5, 0.0, 1.0, -0.5, 0.0,    # 右腿
                      0.0, 0.1, 0.0, -0.3,               # 左臂
                      0.0, -0.1, 0.0, -0.3]              # 右臂

# ============================================================
# Simulation 模块参数
# ============================================================
simulation:
  type: "mujoco"

  mujoco:
    init_height: 1.0
    assist_height: 1.1
    sim_dt: 0.002

# ============================================================
# Behavior Manager 模块参数（FSM 状态机控制）
# ============================================================
behavior_manager:
  # DAMP 状态阻尼 kd（kp=0，软性支撑）
  damp_kd: [1.0, 1.0, 0.6, 1.0, 0.3, 0.2,   # 左腿
            1.0, 1.0, 0.6, 1.0, 0.3, 0.2,   # 右腿
            0.4, 0.2, 0.1, 0.1,             # 左臂
            0.4, 0.2, 0.1, 0.1]             # 右臂

  zero_duration: 2.0

  # 控制周期（秒）
  # 当前同步推理模式下与 rl_dt 相同，未来异步推理时可独立配置为高频（如 0.001 = 1000Hz）
  control_dt: 0.002

# ============================================================
# RL Policy 模块参数
# ============================================================
rl_policy:
  type: "onnx_infer"
  
  # RL 推理周期（秒），对应训练时的推理频率（50Hz）
  rl_dt: 0.02
  
  onnx_infer:
    policy_names: [walk, run]  # 可用策略列表
    default_policy: "walk" # 默认策略

    policies:
      walk:
        model_path: "policy/walk/walk.onnx"
        action_scale: 0.25
        infer_decimation: 1
        action_joint_index: [0, 6, 12, 16, 1, 7, 13, 17, 2, 8, 14, 18, 3, 9, 15, 19, 4, 10, 5, 11]
        rl_default_pos: [0.0, -0.5, 0.0, 1.0, -0.5, 0.0,    # 左腿 mujoco顺序
                         0.0, -0.5, 0.0, 1.0, -0.5, 0.0,    # 右腿
                         0.0, 0.1, 0.0, -0.3,               # 左臂
                         0.0, -0.1, 0.0, -0.3]              # 右臂
        # 训练时的 PD 增益（顺序同 robot_base.kp/kd）
        kp: [50, 50, 80, 50, 20, 10,
             50, 50, 80, 50, 20, 10,
             30, 15, 8, 8,
             30, 15, 8, 8]
        kd: [5, 5, 3, 5, 1.5, 1,
             5, 5, 3, 5, 1.5, 1,
             2, 1, 0.5, 0.5,
             2, 1, 0.5, 0.5]
        observation:
          # 10帧按帧滑窗历史
          segment_0_mode: frame_history
          segment_0_terms: [ang_vel, gravity, command, dof_pos, dof_vel, last_action, gait_phase]
          segment_0_length: 10
          ang_vel_scale: 1.0
          dof_pos_scale: 1.0
          dof_vel_scale: 1.0
        command:
          scale: [1.0, 1.0, 1.0]
          init: [0.0, 0.0, 0.0]
        gait_phase:
          cycle: 0.85
          left_offset: 0.38
          right_offset: 0.88
          left_ratio: 0.38
          right_ratio: 0.38
        max_roll: 0.7
        max_pitch: 0.7
      
      run:
        model_path: "policy/run/run.onnx"
        action_scale: 0.25
        infer_decimation: 1
        action_joint_index: [0, 6, 12, 16, 1, 7, 13, 17, 2, 8, 14, 18, 3, 9, 15, 19, 4, 10, 5, 11]
        rl_default_pos: [0.0, -0.5, 0.0, 1.0, -0.5, 0.0,    # 左腿 mujoco顺序
                         0.0, -0.5, 0.0, 1.0, -0.5, 0.0,    # 右腿
                         0.0, 0.1, 0.0, -0.3,               # 左臂
                         0.0, -0.1, 0.0, -0.3]              # 右臂
        # 训练时的 PD 增益（顺序同 robot_base.kp/kd）
        kp: [50, 50, 80, 50, 20, 10,
             50, 50, 80, 50, 20, 10,
             30, 15, 8, 8,
             30, 15, 8, 8]
        kd: [5, 5, 3, 5, 1.5, 1,
             5, 5, 3, 5, 1.5, 1,
             2, 1, 0.5, 0.5,
             2, 1, 0.5, 0.5]
        observation:
          # 10帧按帧滑窗历史（与 walk 相同观测结构，无缩放）
          segment_0_mode: frame_history
          segment_0_terms: [ang_vel, gravity, command, dof_pos, dof_vel, last_action, gait_phase]
          segment_0_length: 10
          ang_vel_scale: 1.0
          dof_pos_scale: 1.0
          dof_vel_scale: 1.0
        command:
          scale: [1.0, 1.0, 1.0]
          init: [0.0, 0.0, 0.0]
        gait_phase:
          cycle: 0.5
          left_offset: 0.6
          right_offset: 0.1
          left_ratio: 0.6
          right_ratio: 0.6
        max_roll: 0.7
        max_pitch: 0.7

# ============================================================
# Transport 模块参数
# ============================================================
transport:
  type: "udp"  # 通信类型：udp / shm
  
  udp:
    driver_ip: "10.0.90.6"
    control_ip: "10.0.91.0"
    state_port: 8800    # driver → control 发送机器人状态数据
    control_port: 8801  # control → driver 发送控制命令
    hmi_port: 8802      # hmi → control 发送键盘命令

  shm:  # 共享内存通信专属参数（仅限单机多进程）
    prefix: "tiangong"  # 共享内存名称前缀（通道：/hmrs_tiangong_state, /hmrs_tiangong_control, /hmrs_tiangong_hmi）
    capacity: 4         # 环形缓冲区槽位数
    slot_size: 4096     # 每个槽位大小（字节，需大于最大 packet）
